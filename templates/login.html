<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSF Nexus — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #080c0b;
      color: #e0f2e9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111c17;
      border: 1px solid #1c3326;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: fadeIn 0.45s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: rgba(0,230,118,0.07);
      border: 1px solid rgba(0,230,118,0.18);
      border-radius: 14px;
      margin-bottom: 10px;
      animation: pulse-green 3s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.18); }
      50%       { box-shadow: 0 0 18px 4px rgba(0,230,118,0.10); }
    }
    .brand-name { font-size: 1.4rem; font-weight: 800; }
    .brand-name em { color: #00e676; font-style: normal; }
    .brand-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .62rem;
      color: #4a7060;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    /* Form */
    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .65rem;
      color: #4a7060;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 5px;
      margin-top: 14px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      display: flex;
      align-items: center;
      color: #4a7060;
    }
    input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      background: #0d1410;
      border: 1px solid #234030;
      border-radius: 8px;
      color: #e0f2e9;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .88rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: #00e676;
      box-shadow: 0 0 0 3px rgba(0,230,118,0.08);
    }
    input::placeholder { color: #2e5040; }
    input[type="password"],
    input[type="text"].password-field { padding-right: 40px; }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #4a7060;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .eye-btn:hover { color: #00e676; }

    /* Error */
    .error {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,82,82,.08);
      border: 1px solid rgba(255,82,82,.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .72rem;
      color: #ff5252;
      margin-top: 14px;
    }
    .error.visible { display: flex; }

    /* Button */
    .btn {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: #00e676;
      color: #080c0b;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-flex; }

    .footer-note {
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .6rem;
      color: #2a4535;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon-wrap">
      <!-- Bug icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
           fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2l1.88 1.88"/><path d="M14.12 3.88 16 2"/>
        <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/>
        <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6z"/>
        <path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/>
        <path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"/>
        <path d="M22 13h-4"/><path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/>
      </svg>
    </div>
    <div class="brand-name">BSF<em>NEXUS</em></div>
    <div class="brand-sub">
      <!-- Leaf icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"
           fill="none" stroke="#4a7060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
      </svg>
      Larvae Production Prediction System
    </div>
  </div>

  <!-- Error banner -->
  <div class="error {% if error %}visible{% endif %}" id="error-banner">
    <!-- AlertTriangle icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="#ff5252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
      <path d="M12 9v4"/><path d="M12 17h.01"/>
    </svg>
    <span id="error-text">Invalid credentials. Please try again.</span>
  </div>

  <!-- Form -->
  <form method="POST" action="/login" id="login-form">

    <label for="username">Username</label>
    <div class="input-wrap">
      <span class="input-icon">
        <!-- User icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <input type="text" id="username" name="username" placeholder="Enter username" autofocus required/>
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">
        <!-- Lock icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </span>
      <input type="password" id="password" name="password" placeholder="Enter password" required style="padding-right:40px"/>
      <button type="button" class="eye-btn" id="eye-toggle" aria-label="Show password">
        <!-- Eye icon (shown when password hidden) -->
        <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- EyeOff icon (shown when password visible) -->
        <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="display:none">
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
          <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
          <line x1="2" x2="22" y1="2" y2="22"/>
        </svg>
      </button>
    </div>

    <button class="btn" type="submit" id="submit-btn">
      <!-- LogIn icon -->
      <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" x2="3" y1="12" y2="12"/>
      </svg>
      <span id="btn-text">Login</span>
    </button>
  </form>

  <div class="footer-note">BSF Nexus · Authorized Access Only</div>
</div>

<script>
  // Show / hide password
  const eyeToggle = document.getElementById('eye-toggle');
  const passwordInput = document.getElementById('password');
  const iconEye = document.getElementById('icon-eye');
  const iconEyeOff = document.getElementById('icon-eye-off');

  eyeToggle.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    iconEye.style.display    = isHidden ? 'none'  : 'block';
    iconEyeOff.style.display = isHidden ? 'block' : 'none';
    eyeToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });

  // Loading spinner on submit — lets the form POST normally to Flask
  document.getElementById('login-form').addEventListener('submit', function() {
    const btn     = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    btn.disabled = true;
    btnIcon.classList.add('spin');
    btnText.textContent = 'Signing in…';
    // No e.preventDefault() — form submits normally to Flask
  });
</script>
</body>
</html>
